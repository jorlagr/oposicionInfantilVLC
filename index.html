<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Oposición</title>
    <meta
      name="description"
      content="Aplicación web responsive para practicar test de oposición con corrección inmediata."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero__content">
          <p class="eyebrow">Preparación de oposición</p>
          <h1>Test web con corrección inmediata</h1>
          <p class="hero__copy">
            Practica preguntas una a una, revisa el resultado al instante y retoma tu
            progreso desde cualquier dispositivo.
          </p>
        </div>
        <div class="hero__panel">
          <label class="control">
            <span>Examen</span>
            <select id="exam-select" aria-label="Seleccionar examen"></select>
          </label>
          <div class="hero__actions">
            <label class="toggle">
              <input id="random-order" type="checkbox" />
              <span>Orden aleatorio</span>
            </label>
            <button id="reset-progress" class="button button--ghost" type="button">
              Reiniciar progreso
            </button>
          </div>
        </div>
      </header>

      <main class="layout">
        <aside class="summary-card">
          <div class="summary-card__header">
            <p class="eyebrow">Resumen</p>
            <h2 id="exam-title">Cargando examen...</h2>
          </div>

          <dl class="stats-grid" aria-live="polite">
            <div class="stat">
              <dt>Pregunta</dt>
              <dd id="stat-current">0 / 0</dd>
            </div>
            <div class="stat">
              <dt>Aciertos</dt>
              <dd id="stat-correct">0</dd>
            </div>
            <div class="stat">
              <dt>Fallos</dt>
              <dd id="stat-incorrect">0</dd>
            </div>
            <div class="stat">
              <dt>Sin responder</dt>
              <dd id="stat-pending">0</dd>
            </div>
          </dl>

          <div class="progress-block">
            <div class="progress-block__meta">
              <span>Progreso</span>
              <strong id="progress-label">0%</strong>
            </div>
            <div class="progress-bar" aria-hidden="true">
              <div id="progress-fill" class="progress-bar__fill"></div>
            </div>
          </div>

          <nav class="question-map" aria-label="Mapa de preguntas">
            <div id="question-map" class="question-map__grid"></div>
          </nav>
        </aside>

        <section class="question-card" aria-live="polite">
          <div class="question-card__header">
            <p id="question-counter" class="eyebrow">Pregunta 1</p>
            <h2 id="question-text">Cargando pregunta...</h2>
          </div>

          <div id="options" class="options" role="list"></div>

          <section id="feedback" class="feedback" hidden>
            <p id="feedback-label" class="feedback__label"></p>
            <p id="feedback-text" class="feedback__text"></p>
          </section>

          <footer class="question-card__footer">
            <button id="prev-question" class="button button--ghost" type="button">
              Anterior
            </button>
            <button id="next-question" class="button" type="button">Siguiente</button>
          </footer>
        </section>
      </main>
    </div>

    <script src="./data/exams.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
